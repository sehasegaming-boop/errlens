<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 432" font-family="'SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="14.5">
  <!-- window -->
  <rect x="0" y="0" width="760" height="432" rx="10" fill="#1b1d2b"/>
  <rect x="0" y="0" width="760" height="34" rx="10" fill="#252736"/>
  <rect x="0" y="22" width="760" height="12" fill="#252736"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="17" r="6" fill="#febc2e"/>
  <circle cx="62" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="22" fill="#8b8da3" text-anchor="middle" font-size="13">errlens — demo</text>

  <!-- first command: a failing run -->
  <text x="22" y="64"  fill="#6c7086">$</text>
  <text x="40" y="64"  fill="#cdd6f4">python app.py</text>

  <text x="22" y="90"  fill="#f38ba8">Traceback (most recent call last):</text>
  <text x="22" y="112" fill="#a6adc8">  File "app.py", line 1, in &lt;module&gt;</text>
  <text x="22" y="134" fill="#a6adc8">    import requests</text>
  <text x="22" y="156" fill="#f38ba8">ModuleNotFoundError: No module named 'requests'</text>

  <!-- pipe into errlens -->
  <text x="22" y="196" fill="#6c7086">$</text>
  <text x="40" y="196" fill="#cdd6f4">python app.py 2>&amp;1 | errlens</text>

  <!-- explanation -->
  <text x="22" y="226" fill="#89dceb" font-weight="bold">WHAT:</text>
  <text x="78" y="226" fill="#cdd6f4">Python cannot find the 'requests' module.</text>

  <text x="22" y="252" fill="#f9e2af" font-weight="bold">WHY:</text>
  <text x="68" y="252" fill="#cdd6f4">The package is not installed in your current environment.</text>

  <text x="22" y="278" fill="#a6e3a1" font-weight="bold">HOW TO FIX:</text>
  <text x="40" y="302" fill="#cdd6f4">1. Install it:  </text>
  <text x="178" y="302" fill="#94e2d5">pip install requests</text>
  <text x="40" y="324" fill="#cdd6f4">2. Verify:      </text>
  <text x="178" y="324" fill="#94e2d5">python -m pip show requests</text>

  <!-- footer tagline -->
  <rect x="0" y="368" width="760" height="64" fill="#181a27"/>
  <text x="22" y="400" fill="#a6adc8">🔒 100% local · powered by Ollama · zero dependencies</text>
  <text x="22" y="420" fill="#6c7086" font-size="13">no data leaves your machine</text>
</svg>
